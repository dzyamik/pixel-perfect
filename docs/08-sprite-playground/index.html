<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>pixel-perfect — 08 sprite playground</title>
        <style>
            .toolbar {
                position: fixed;
                top: 8px;
                right: 8px;
                z-index: 10;
                display: flex;
                gap: 8px;
                font-family: monospace;
                font-size: 12px;
                color: #cfd6e0;
            }
            .toolbar label {
                background: rgba(20, 30, 40, 0.85);
                padding: 6px 10px;
                border-radius: 4px;
                cursor: pointer;
                user-select: none;
            }
            .toolbar label:hover {
                background: rgba(30, 50, 70, 0.95);
            }
            .toolbar input[type='file'] {
                display: none;
            }
            .toolbar input[type='checkbox'] {
                margin-right: 4px;
                vertical-align: -1px;
            }
            .toolbar input[type='range'] {
                vertical-align: -2px;
                width: 80px;
                margin: 0 4px;
            }
            .toolbar .scale-readout {
                color: #8b949e;
                font-variant-numeric: tabular-nums;
                margin-left: 2px;
            }
        </style>
      <script type="module" crossorigin src="../assets/08-sprite-playground-BXA4nHA_.js"></script>
      <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-B5Qt9EMX.js">
      <link rel="modulepreload" crossorigin href="../assets/sandbox-tG7g2_OG.js">
      <link rel="modulepreload" crossorigin href="../assets/code-panel-DA5K6ZLG.js">
      <link rel="modulepreload" crossorigin href="../assets/main-CSr5OMOU.js">
      <link rel="stylesheet" crossorigin href="../assets/style-DhlUcul5.css">
    </head>
    <body>
        <nav class="nav">
            <a href="../">← all demos</a>
            <a
                href="https://github.com/dzyamik/pixel-perfect/blob/main/examples/08-sprite-playground/main.ts"
                style="margin-left: 1.5rem"
                >view source</a
            >
        </nav>
        <div class="toolbar">
            <label>
                <input type="checkbox" id="show-outline" checked />
                outline
            </label>
            <label>
                <input type="checkbox" id="show-aabb" />
                AABB
            </label>
            <label>
                scale
                <input
                    type="range"
                    id="scale-slider"
                    min="1"
                    max="6"
                    step="0.5"
                    value="1"
                />
                <span class="scale-readout" id="scale-readout">1.0×</span>
            </label>
            <label>
                rotation
                <input
                    type="range"
                    id="rotation-slider"
                    min="-180"
                    max="180"
                    step="5"
                    value="0"
                />
                <span class="scale-readout" id="rotation-readout">0°</span>
            </label>
            <label>
                upload PNG
                <input type="file" id="sprite-upload" accept="image/png,image/*" />
            </label>
        </div>
        <div id="app"></div>
    </body>
</html>
