<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>pixel-perfect — 08 sprite playground</title>
        <style>
            .toolbar {
                position: fixed;
                top: 8px;
                right: 8px;
                z-index: 10;
                display: flex;
                gap: 8px;
                font-family: monospace;
                font-size: 12px;
                color: #cfd6e0;
            }
            .toolbar label {
                background: rgba(20, 30, 40, 0.85);
                padding: 6px 10px;
                border-radius: 4px;
                cursor: pointer;
                user-select: none;
            }
            .toolbar label:hover {
                background: rgba(30, 50, 70, 0.95);
            }
            .toolbar input[type='file'] {
                display: none;
            }
            .toolbar input[type='checkbox'] {
                margin-right: 4px;
                vertical-align: -1px;
            }
        </style>
      <script type="module" crossorigin src="../assets/08-sprite-playground-B5ywkEO1.js"></script>
      <link rel="modulepreload" crossorigin href="../assets/sandbox-CxGrVX1f.js">
      <link rel="stylesheet" crossorigin href="../assets/style-DhlUcul5.css">
    </head>
    <body>
        <nav class="nav">
            <a href="../">← all demos</a>
            <a
                href="https://github.com/dzyamik/pixel-perfect/blob/main/examples/08-sprite-playground/main.ts"
                style="margin-left: 1.5rem"
                >view source</a
            >
        </nav>
        <div class="toolbar">
            <label>
                <input type="checkbox" id="show-outline" checked />
                outline
            </label>
            <label>
                <input type="checkbox" id="show-aabb" />
                AABB
            </label>
            <label>
                upload PNG
                <input type="file" id="sprite-upload" accept="image/png,image/*" />
            </label>
        </div>
        <div id="app"></div>
    </body>
</html>
